<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#03050a;overflow:hidden;font-family:'Space Grotesk',system-ui,sans-serif;color:#eef3ff}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fan{to{transform:rotate(360deg)}}
    @keyframes dash{to{stroke-dashoffset:-60}}
    @keyframes busflow{to{stroke-dashoffset:-32}}
    @keyframes hum{0%,100%{opacity:.45}50%{opacity:.95}}
    @keyframes pulse{0%{transform:scale(.5);opacity:.55}100%{transform:scale(2.4);opacity:0}}
    @keyframes flick{0%,100%{opacity:.5}50%{opacity:1}}
    @keyframes scan{0%{transform:translateY(0)}100%{transform:translateY(220px)}}
    @keyframes shimmer{0%,100%{opacity:.18;transform:translateY(0) scaleY(1)}50%{opacity:.42;transform:translateY(-4px) scaleY(1.08)}}
    @keyframes rgbcycle{0%{background-position:0% 50%}100%{background-position:200% 50%}}
    @keyframes dustA{0%{transform:translate(0,0)}100%{transform:translate(40px,-70px)}}
    @keyframes dustB{0%{transform:translate(0,0)}100%{transform:translate(-55px,-90px)}}
    @keyframes tracepulse{0%{offset-distance:0%;opacity:0}10%{opacity:1}90%{opacity:1}100%{offset-distance:100%;opacity:0}}
    @keyframes breathe{0%,100%{opacity:.5}50%{opacity:.85}}
    @keyframes ledblink{0%,100%{opacity:.35}50%{opacity:1}}
    ::selection{background:#4fd6e0;color:#04060c}
    input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;width:100%;height:16px;cursor:pointer}
    input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:4px;background:linear-gradient(90deg,#4fd6e0 var(--pct,0%),rgba(160,190,230,.16) var(--pct,0%))}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#9af0f7;box-shadow:0 0 12px #4fd6e0;margin-top:-5px}
    .ctlbtn{display:flex;align-items:center;justify-content:center;border:1px solid rgba(160,190,230,.18);background:rgba(18,26,40,.7);color:#cfe0f4;border-radius:9px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .15s ease;user-select:none}
    .ctlbtn:hover{border-color:#4fd6e0;color:#9af0f7;box-shadow:0 0 14px rgba(79,214,224,.25)}
    .urlin{background:rgba(8,12,20,.8);border:1px solid rgba(160,190,230,.2);color:#dfeaf8;font-family:'IBM Plex Mono',monospace;border-radius:8px;padding:7px 11px;outline:none;font-size:12px}
    .urlin:focus{border-color:#4fd6e0;box-shadow:0 0 12px rgba(79,214,224,.2)}
  </style>
</helmet>
<div style="position:fixed;inset:0;background:radial-gradient(130% 100% at 50% 35%,#0a1322 0%,#05080f 55%,#02040a 100%);overflow:hidden">

  <div style="position:absolute;inset:0;box-shadow:inset 0 0 280px 70px rgba(0,0,0,.85);pointer-events:none;z-index:60"></div>

  {{ stage }}

  <!-- top HUD -->
  <div style="position:absolute;top:0;left:0;right:0;padding:22px 30px;display:flex;align-items:flex-start;justify-content:space-between;z-index:45;pointer-events:none">
    <div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="width:9px;height:9px;border-radius:50%;background:{{ layerColor }};box-shadow:0 0 12px {{ layerColor }};animation:flick 2s infinite"></span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.32em;color:{{ layerColor }}">{{ chapterLayer }}</span>
      </div>
      <div style="font-size:25px;font-weight:600;margin-top:7px;letter-spacing:-.01em">{{ chapterTitle }}</div>
      <div style="font-size:13px;color:#8294af;margin-top:3px;max-width:440px;line-height:1.45">{{ chapterDesc }}</div>
    </div>
    <div style="text-align:right;font-family:'IBM Plex Mono',monospace">
      <div style="font-size:11px;letter-spacing:.26em;color:#5a6c8a">INSIDE&nbsp;THE&nbsp;MACHINE</div>
      <div style="font-size:11px;color:#46566f;margin-top:4px">SCENE {{ chapterNo }} / {{ chapterCount }}</div>
      <div style="font-size:10px;color:#3c4a60;margin-top:8px;letter-spacing:.12em">CLICK ANY PART TO INSPECT</div>
    </div>
  </div>

  <!-- inspector -->
  <sc-if value="{{ sel }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;top:0;right:0;bottom:0;width:372px;background:linear-gradient(180deg,rgba(8,13,23,.97),rgba(5,9,17,.98));border-left:1px solid rgba(120,160,210,.18);backdrop-filter:blur(9px);z-index:70;display:flex;flex-direction:column;box-shadow:-24px 0 70px rgba(0,0,0,.55)">
      <div style="padding:18px 20px;border-bottom:1px solid rgba(120,160,210,.12);display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.28em;color:#5a6c8a">{{ sel.kicker }}</div>
          <div style="font-size:18px;font-weight:600;margin-top:3px">{{ sel.title }}</div>
        </div>
        <div class="ctlbtn" style="width:30px;height:30px;font-size:16px" onClick="{{ onClose }}">×</div>
      </div>
      <div style="flex:1;overflow-y:auto;padding:14px 16px">{{ inspectorBody }}</div>
    </div>
  </sc-if>

  <!-- transport controls -->
  <div style="position:absolute;left:0;right:0;bottom:0;z-index:50;padding:16px 26px 18px;background:linear-gradient(0deg,rgba(3,5,11,.95),rgba(3,5,11,.45) 70%,transparent)">
    <div style="position:relative;margin-bottom:13px">
      {{ ticksNode }}
      <input type="range" min="0" max="{{ duration }}" step="0.02" value="{{ time }}" oninput="{{ onScrub }}" style="--pct: {{ pct }}; position:relative;z-index:2"/>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="ctlbtn" style="width:38px;height:34px;font-size:13px" onClick="{{ onRestart }}" title="Restart">↺</div>
      <div class="ctlbtn" style="width:38px;height:34px;font-size:12px" onClick="{{ onPrev }}" title="Previous">⟨⟨</div>
      <div class="ctlbtn" style="width:50px;height:34px;font-size:13px;border-color:rgba(79,214,224,.45);color:#9af0f7" onClick="{{ onPlay }}" title="Play / Pause">{{ playLabel }}</div>
      <div class="ctlbtn" style="width:38px;height:34px;font-size:12px" onClick="{{ onNext }}" title="Next">⟩⟩</div>
      <div style="display:flex;gap:5px;margin-left:4px">
        <sc-for list="{{ speeds }}" as="s" hint-placeholder-count="4"><div class="ctlbtn" style="height:34px;padding:0 9px;font-size:11px;border-color:{{ s.bc }};color:{{ s.fc }};background:{{ s.bg }}" onClick="{{ s.set }}">{{ s.label }}</div></sc-for>
      </div>
      <div style="flex:1"></div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#5a6c8a;letter-spacing:.06em">{{ clock }}</div>
      <div style="display:flex;align-items:center;gap:7px;margin-left:6px">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#5a6c8a">GET</span>
        <input class="urlin" value="{{ url }}" oninput="{{ onUrl }}" spellcheck="false" style="width:220px"/>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  C = { cyan:'#4fd6e0', green:'#54e08a', amber:'#ffb454', violet:'#b48cff', red:'#ff6b8a', white:'#eef3ff', dim:'#8294af', kernel:'#9fb4d4', copper:'#3ad29a' };
  state = { time:0, playing:true, speed:1, url:'https://www.google.com', sel:null };

  P = {
    cpu:{x:300,y:248,w:212,h:212}, vrm:{x:300,y:158,w:212,h:66},
    ramZone:{x:600,y:150,w:230,h:252}, chipset:{x:560,y:520,w:132,h:132},
    nic:{x:842,y:468,w:152,h:122}, ethport:{x:1016,y:498,w:80,h:66},
    ssd:{x:300,y:602,w:240,h:44}, pcie:{x:200,y:540,w:560,h:28}, fan:{x:104,y:240,w:152,h:152},
  };
  BW=1120; BH=720;

  chaptersRaw=[
    {t:'Your Desk',           layer:'CLIENT',       col:'#4fd6e0', dur:6,  d:'You type a URL, press Enter, and the camera dives through the glass.'},
    {t:'The Living Board',    layer:'HARDWARE',     col:'#4fd6e0', dur:5,  d:'A real motherboard, alive — power rails, clock pulses and data buses flowing.'},
    {t:'Application · RAM',    layer:'APPLICATION',  col:'#4fd6e0', dur:7,  d:'The browser process builds an HTTP request object, stored in physical memory.'},
    {t:'CPU Execution',       layer:'COMPUTE',      col:'#4fd6e0', dur:7,  d:'One core runs the main thread — registers and assembly stepping live.'},
    {t:'System Call',         layer:'KERNEL GATE',  col:'#ffb454', dur:5,  d:'send() opens a portal from Ring 3 to Ring 0 — privilege switches.'},
    {t:'Kernel Networking',   layer:'KERNEL',       col:'#9fb4d4', dur:8,  d:'Execution beams flow CPU → kernel code → RAM through the TCP/IP stack.'},
    {t:'Memory Objects',      layer:'MEMORY',       col:'#54e08a', dur:6,  d:'Each allocation appears physically in RAM: socket, SKB, headers, frame.'},
    {t:'TCP Segment',         layer:'TRANSPORT',    col:'#54e08a', dur:6,  d:'The transport layer stamps sequence, ack, checksum, flags and window.'},
    {t:'IP Routing',          layer:'NETWORK',      col:'#ffb454', dur:5,  d:'The routing engine looks up the destination and adds the IP header.'},
    {t:'NIC Driver',          layer:'DRIVER',       col:'#b48cff', dur:6,  d:'ndo_start_xmit() programs the descriptor ring across the PCIe bus.'},
    {t:'NIC Firmware',        layer:'FIRMWARE',     col:'#b48cff', dur:7,  d:'Inside the card, its own processor DMAs the frame from RAM out to the PHY.'},
    {t:'Interrupt',           layer:'IRQ',          col:'#ff6b8a', dur:5,  d:'TX-complete fires an interrupt back across the traces to the CPU.'},
    {t:'TCP Handshake & The Journey', layer:'INTERNET · TCP', col:'#4fd6e0', dur:28, d:'Frames leave the NIC and ride EM waves across the Internet — SYN, SYN-ACK, ACK establish the connection, then segmented data streams to Google and is reassembled in order.'},
  ];

  get chapters(){ if(this._ch) return this._ch; let s=0; this._ch=this.chaptersRaw.map(c=>{const o={...c,start:s,end:s+c.dur};s+=c.dur;return o;}); this._dur=s; return this._ch; }
  get duration(){ this.chapters; return this._dur; }

  componentDidMount(){ this._last=null; this._raf=requestAnimationFrame(this.tick); this._on=()=>this.forceUpdate(); window.addEventListener('resize',this._on); }
  componentWillUnmount(){ cancelAnimationFrame(this._raf); window.removeEventListener('resize',this._on); }
  tick=(now)=>{ if(this._last==null)this._last=now; const dt=Math.min(0.05,(now-this._last)/1000); this._last=now;
    if(this.state.playing){ let t=this.state.time+dt*this.state.speed; if(t>=this.duration)this.setState({time:this.duration,playing:false}); else this.setState({time:t}); }
    this._raf=requestAnimationFrame(this.tick); };

  cl(v,a,b){return Math.max(a,Math.min(b,v));}
  ss(a,b,x){const t=this.cl((x-a)/(b-a),0,1);return t*t*(3-2*t);}
  // ease in-out cubic — smoother, more cinematic acceleration/settle than smoothstep
  eio(a,b,x){const t=this.cl((x-a)/(b-a),0,1);return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
  lerp(a,b,t){return a+(b-a)*t;}
  locate(time){const ch=this.chapters;let i=ch.length-1;for(let k=0;k<ch.length;k++){if(time<ch[k].end){i=k;break;}}const c=ch[i];return{i,p:this.cl((time-c.start)/c.dur,0,1)};}
  host(){try{return this.state.url.replace(/^https?:\/\//,'').split('/')[0]||'example.com';}catch(e){return 'example.com';}}
  path(){try{const s=this.state.url.replace(/^https?:\/\//,'');const p=s.indexOf('/');return p<0?'/':s.slice(p);}catch(e){return '/';}}
  cen(o){return{x:o.x+o.w/2,y:o.y+o.h/2};}

  // ---------- CAMERA ----------
  focusFor(i){const P=this.P,c=this.cen.bind(this);
    const F={0:{x:560,y:360,s:5.5},1:{x:560,y:360,s:1},2:{...c(P.ramZone),s:1.75},3:{...c(P.cpu),s:1.85},
      4:{...c(P.cpu),s:1.85},5:{x:470,y:360,s:1.45},6:{...c(P.ramZone),s:1.7},7:{...c(P.ramZone),s:1.6},
      8:{...c(P.chipset),s:1.95},9:{x:690,y:470,s:1.4},10:{...c(P.nic),s:2.7},11:{x:610,y:380,s:1.05},12:{x:900,y:500,s:1.35}};
    return F[i]||F[1];}
  cam(i,p){const f1=this.focusFor(i),f0=this.focusFor(Math.max(0,i-1));
    // smoother eased glide; scale leads slightly so we "pull focus" before drifting into place
    const k=this.eio(0,0.5,p), ks=this.eio(0,0.42,p);
    return {x:this.lerp(f0.x,f1.x,k),y:this.lerp(f0.y,f1.y,k),s:this.lerp(f0.s,f1.s,ks)};}

  // ---------- small builders ----------
  part(key,o,style,kids,onClick){const e=React.createElement;
    return e('div',{key,onClick,style:{position:'absolute',left:o.x+'px',top:o.y+'px',width:o.w+'px',height:o.h+'px',cursor:onClick?'pointer':'default',...style}},kids);}

  holo(pos,opt){const e=React.createElement,C=this.C,col=opt.color||C.cyan,w=opt.w||200;
    const x=this.cl(pos.x,18,(this._vw||1280)-w-20), y=this.cl(pos.y,148,(this._vh||720)-250);
    const rows=(opt.rows||[]).map((r,k)=>e('div',{key:k,style:{display:'flex',justifyContent:'space-between',gap:'12px',padding:'2px 9px',borderRadius:'4px',
      background:r.on?col+'22':'transparent',color:r.on?'#eef6ff':(r.dim?'#6f7f99':'#bcd0e8'),fontFamily:'IBM Plex Mono,monospace',fontSize:'11px',lineHeight:'1.85',
      borderLeft:r.on?'2px solid '+col:'2px solid transparent'}}, e('span',null,r.l), r.r!=null?e('span',{style:{color:r.on?col:'#7f93b0'}},r.r):null));
    return e('div',{key:opt.key,style:{position:'absolute',left:x+'px',top:y+'px',width:w+'px',
      background:'linear-gradient(180deg,'+col+'18,rgba(6,12,22,.86))',border:'1px solid '+col+'66',borderRadius:'10px',overflow:'hidden',
      boxShadow:'0 0 34px '+col+'33,0 18px 50px rgba(0,0,0,.5)',backdropFilter:'blur(4px)',zIndex:30,pointerEvents:'none'}},
      e('div',{style:{padding:'7px 11px',borderBottom:'1px solid '+col+'33',display:'flex',alignItems:'center',gap:'7px',background:col+'14'}},
        e('span',{style:{width:'6px',height:'6px',borderRadius:'50%',background:col,boxShadow:'0 0 8px '+col,animation:'flick 1.6s infinite'}}),
        e('span',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:'10px',letterSpacing:'.16em',color:col}},opt.title)),
      e('div',{style:{padding:'7px 4px',position:'relative'}}, rows,
        e('div',{style:{position:'absolute',left:0,right:0,top:0,height:'14px',background:'linear-gradient(180deg,'+col+'22,transparent)',animation:'scan 3.5s linear infinite',pointerEvents:'none'}})));}

  capsule(level,h,opt={}){const C=this.C,e=React.createElement;
    const segs=[{c:C.violet,w:0.5,l:'ETH'},{c:C.amber,w:0.46,l:'IP'},{c:C.green,w:0.46,l:'TCP'},{c:C.cyan,w:0.46,l:'HTTP'},{c:C.white,w:1.3,l:'DATA'}];
    const shown=segs.slice(segs.length-level),outer=shown[0].c;
    const kids=shown.map((s,idx)=>e('div',{key:idx,style:{flex:s.l==='DATA'?'1 1 auto':'0 0 auto',width:s.l==='DATA'?'auto':(s.w*h)+'px',
      background:s.l==='DATA'?'repeating-linear-gradient(90deg,'+s.c+'22 0 5px,'+s.c+'10 5px 10px)':s.c+'cc',borderRight:idx<shown.length-1?'1px solid rgba(4,6,12,.6)':'none',
      display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'IBM Plex Mono,monospace',fontSize:Math.max(6,h*0.2)+'px',fontWeight:600,
      color:s.l==='DATA'?'#bcd0e8':'#06121a'}}, h>20?s.l:''));
    if(level>=5)kids.push(e('div',{key:'f',style:{flex:'0 0 auto',width:(0.28*h)+'px',background:C.violet+'66'}}));
    return e('div',{onClick:opt.onClick,style:{display:'flex',height:h+'px',borderRadius:(h*0.5)+'px',overflow:'hidden',border:'1px solid '+outer+'aa',
      boxShadow:'0 0 '+(h*0.7)+'px '+outer+'88',cursor:opt.onClick?'pointer':'default',...(opt.style||{})}},kids);}

  // ---------- INSPECTOR DATA ----------
  S(label,color,rows){return{label,color,rows};}
  open(o){this.setState({sel:o,playing:false});}
  inspCPU(){const C=this.C;return{kicker:'HARDWARE · SILICON',title:'CPU — 8 cores',sections:[
    this.S('PACKAGE',C.cyan,['Cores: 8 · Threads: 16','Base 3.4 GHz · Boost 5.1 GHz','L3 Cache: 32 MB','TDP: 65 W','Microarch: x86-64']),
    this.S('CORE 0 · ACTIVE',C.cyan,['Thread: chrome (main)','Ring: 0 (kernel)','IPC ≈ 3.2','Branch predictor: 98.4% hit']),
    this.S('REGISTERS',C.green,['RAX 0x00007ffd1a2c','RBX 0x0000000000','RCX 0x00007f9e4410','RDX 0x0000000200','RSP 0x00007ffd1a08','RIP 0xffffffff8174']) ]};}
  inspRAM(){const C=this.C,h=this.host();return{kicker:'HARDWARE · DDR5',title:'Main Memory',sections:[
    this.S('MODULE',C.green,['16 GB DDR5-6000','Dual channel','In use: 11.3 GB']),
    this.S('REQUEST OBJECT',C.cyan,['Addr: 0x7f9e4410','Size: 480 B','Owner: chrome','GET '+this.path()+' → '+h]),
    this.S('SEGMENTS',C.amber,['Stack  0x7ffd…','Heap   0x55a1…','Code   0x4000…','Shared libs .so']) ]};}
  inspNIC(){const C=this.C;return{kicker:'HARDWARE · CONTROLLER',title:'Network Card',sections:[
    this.S('CONTROLLER',C.violet,['Realtek-class GbE','Link: 1000 Mbps full','MAC f0:18:98:2a:71:0c']),
    this.S('FIRMWARE',C.violet,['Boot ROM: loaded','State: running','Checksum offload: on','TX scheduler: active']),
    this.S('DMA ENGINE',C.amber,['Descriptor ring: 256','Ring head → 41','Bus: PCIe x1 Gen3']) ]};}
  inspPacket(i){const C=this.C,h=this.host();return{kicker:'PACKET '+(i+1)+' / 7',title:'Frame on the wire',sections:[
    this.S('HTTP · APPLICATION',C.cyan,['GET '+this.path()+' HTTP/1.1','Host: '+h,'User-Agent: Mozilla/5.0','Accept: text/html']),
    this.S('TCP · TRANSPORT',C.green,['Src Port '+(49152+i*7),'Dst Port 443','Seq '+(2748113900+i*1460),'Flags PSH, ACK · Win 64240']),
    this.S('IP · NETWORK',C.amber,['Ver 4 · TTL 64 · TCP','Src 192.168.1.24','Dst 142.250.72.46']),
    this.S('ETHERNET · LINK',C.violet,['Dst a4:5e:60:12:cd:8f','Src f0:18:98:2a:71:0c','Type 0x0800 IPv4']),
    this.S('PAYLOAD',C.white,['GET '+this.path()+' HTTP/1.1','…segment '+(i+1)+' of 7…']) ]};}
  inspKernel(){const C=this.C;return{kicker:'SOFTWARE · RING 0',title:'Linux Net Stack',sections:[
    this.S('CALL STACK',C.kernel,['send()','sock_sendmsg()','tcp_sendmsg()','ip_queue_xmit()','dev_queue_xmit()']),
    this.S('SOURCE',C.cyan,['net/socket.c','net/ipv4/tcp_output.c','net/ipv4/ip_output.c','net/core/dev.c']) ]};}
  inspChipset(){const C=this.C;return{kicker:'HARDWARE · PCH',title:'Chipset (PCH)',sections:[
    this.S('PLATFORM HUB',C.amber,['Southbridge / PCH','DMI 4.0 link to CPU','PCIe 3.0 ×20 lanes']),
    this.S('PROVIDES',C.cyan,['SATA · USB · LAN','HD Audio · SPI (BIOS)','Platform clocks']),
    this.S('ROLE',C.dim,['Routes low-speed I/O','Bridges CPU ↔ peripherals']) ]};}
  inspVRM(){const C=this.C;return{kicker:'HARDWARE · POWER',title:'VRM — Power Stage',sections:[
    this.S('REGULATION',C.amber,['12 V → ~1.3 V Vcore','Phases: 5 + chokes','MOSFET switching']),
    this.S('TELEMETRY',C.cyan,['Vcore 1.28 V','Current ~95 A','Temp 48 °C']),
    this.S('ROLE',C.dim,['Clean, stable CPU power','Responds to load in µs']) ]};}
  inspFan(){const C=this.C;return{kicker:'HARDWARE · THERMAL',title:'CPU Cooler',sections:[
    this.S('FAN',C.cyan,['Speed 1180 RPM','PWM controlled','Airflow 62 CFM']),
    this.S('THERMAL',C.amber,['CPU 54 °C','Target ≤ 85 °C','Heat-pipe tower']) ]};}
  inspSSD(){const C=this.C;return{kicker:'HARDWARE · STORAGE',title:'M.2 NVMe SSD',sections:[
    this.S('DRIVE',C.cyan,['1 TB NVMe','PCIe 4.0 ×4','Seq read 7,000 MB/s']),
    this.S('HOLDS',C.green,['OS + page cache','chrome binary + .so','Swap (if needed)']),
    this.S('ROLE',C.dim,['Backs RAM via paging','Loads code on demand']) ]};}
  inspPCIe(){const C=this.C;return{kicker:'HARDWARE · BUS',title:'PCIe ×16 Slot',sections:[
    this.S('LINK',C.cyan,['PCIe 4.0 ×16','~32 GB/s each way','Hosts the GPU']),
    this.S('NOTE',C.dim,['NIC uses a separate','PCIe ×1 link to the PCH']) ]};}
  inspEth(){const C=this.C;return{kicker:'HARDWARE · PHY',title:'RJ45 / Ethernet PHY',sections:[
    this.S('LINK',C.green,['1000 Mbps full-duplex','Auto-MDIX','Green LED: link · Amber: act']),

              e('div',{style:{flex:1,display:'flex',alignItems:'center',gap:'9px',background:'#0c121d',border:'1px solid '+(showCaret?'rgba(79,214,224,.5)':'rgba(120,160,210,.15)'),borderRadius:'18px',padding:'8px 14px',margin:'0 8px'}},
                e('span',{style:{width:'7px',height:'7px',borderRadius:'50%',border:'1.5px solid #6a7d9a'}}),
                e('span',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:'13px',color:'#dfeaf8'}},url.slice(0,typed),showCaret?e('span',{style:{display:'inline-block',width:'2px',height:'14px',background:C.cyan,marginLeft:'1px',verticalAlign:'-2px',opacity:Math.sin(p*40)>0?1:.2}}):null),
                e('span',{style:{flex:1}}),entered?e('span',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:'10px',color:C.cyan,letterSpacing:'.1em'}},'⏎ ENTER'):null)),
            e('div',{style:{height:'300px',background:'radial-gradient(120% 90% at 50% 30%,#0d1626,#060a12)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'18px',position:'relative'}},
              e('div',{style:{width:'120px',height:'120px',borderRadius:'50%',border:'2px solid '+C.cyan+'44',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 0 50px '+C.cyan+(entered?'55':'18')}},
                e('div',{style:{width:'66px',height:'66px',borderRadius:'50%',background:'conic-gradient('+C.cyan+','+C.green+','+C.amber+','+C.violet+','+C.cyan+')',animation:entered?'spin 1.4s linear infinite':'none',opacity:entered?1:.4}})),
              e('div',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:'12px',color:'#6a7d9a',letterSpacing:'.2em'}},entered?'RESOLVING '+this.host()+' …':'READY'),
              entered?e('div',{style:{position:'absolute',inset:0,background:C.cyan,opacity:flash*0.12}}):null)))));}

  // ---------- JOURNEY · TCP HANDSHAKE + SEGMENTED DATA (scene 12) ----------
  stars(){const e=React.createElement;if(this._stars)return this._stars;
    const dots=Array.from({length:90}).map((_,k)=>{const s=(k%5===0?2:1)+Math.random();return e('div',{key:k,style:{position:'absolute',left:(Math.random()*100)+'%',top:(Math.random()*100)+'%',width:s+'px',height:s+'px',borderRadius:'50%',background:'rgba(200,225,255,'+(0.18+Math.random()*0.6).toFixed(2)+')',boxShadow:'0 0 4px rgba(160,210,255,.5)',animation:'flick '+(2+Math.random()*4).toFixed(1)+'s infinite',animationDelay:(-Math.random()*4).toFixed(1)+'s'}});});
    this._stars=e('div',{key:'stars',style:{position:'absolute',inset:0,pointerEvents:'none'}},dots);return this._stars;}

  // a packet on the wire (world space): mini encapsulated capsule + label
  jpkt(key,x,y,label,col,scale,on){const e=React.createElement,C=this.C;
    return e('div',{key,onClick:on,style:{position:'absolute',left:x+'px',top:y+'px',transform:'translate(-50%,-50%) scale('+(scale||1)+')',zIndex:6,cursor:on?'pointer':'default'}},
      e('div',{style:{display:'flex',alignItems:'center',height:'26px',borderRadius:'13px',overflow:'hidden',border:'1px solid '+col+'aa',boxShadow:'0 0 22px '+col+'aa,inset 0 0 8px rgba(255,255,255,.15)'}},
        e('div',{style:{width:'8px',height:'100%',background:C.violet+'cc'}}),
        e('div',{style:{width:'8px',height:'100%',background:C.amber+'cc'}}),
        e('div',{style:{width:'8px',height:'100%',background:C.green+'cc'}}),
        e('div',{style:{padding:'0 11px',height:'100%',display:'flex',alignItems:'center',background:'rgba(6,12,22,.92)',fontFamily:'IBM Plex Mono,monospace',fontSize:'10px',fontWeight:600,color:col,whiteSpace:'nowrap'}},label)),
      e('div',{style:{position:'absolute',left:'-6px',top:'50%',width:'10px',height:'10px',marginTop:'-5px',borderRadius:'50%',background:col,boxShadow:'0 0 14px '+col,animation:'pulse 1.4s ease-out infinite'}}));}

  reasmBuffer(recv,delivered,sx,sy,N){const e=React.createElement,C=this.C;
    return e('div',{key:'reasm',style:{position:'absolute',left:(sx+46)+'px',top:(sy-96)+'px',width:'186px',background:'linear-gradient(180deg,rgba(10,18,30,.95),rgba(6,12,22,.96))',border:'1px solid '+C.white+'33',borderRadius:'10px',padding:'10px 11px',boxShadow:'0 0 30px rgba(0,0,0,.6)',zIndex:7}},
      e('div',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:'10px',letterSpacing:'.16em',color:C.green,marginBottom:'8px'}},'REASSEMBLY BUFFER'),
      ...Array.from({length:N}).map((_,k)=>{const got=k<recv;return e('div',{key:k,style:{display:'flex',justifyContent:'space-between',alignItems:'center',height:'18px',marginBottom:'4px',padding:'0 8px',borderRadius:'4px',background:got?C.green+'22':'rgba(255,255,255,.04)',border:'1px solid '+(got?C.green+'66':'rgba(255,255,255,.08)'),fontFamily:'IBM Plex Mono,monospace',fontSize:'9px',color:got?'#dff6e8':'#5a6c8a'}},e('span',null,'seq '+(k*1460)),e('span',null,got?'✓':'…'));}),
      delivered?e('div',{style:{marginTop:'6px',textAlign:'center',fontFamily:'IBM Plex Mono,monospace',fontSize:'10px',color:C.green}},'→ delivered to application'):null);}

  handshakeLadder(phid){const e=React.createElement,C=this.C;
    const idx={EGRESS:-1,SYN:0,SYNACK:1,ACK:2,EST:3,DATA:3,REASM:3,REPLY:3}[phid];
    const steps=[['SYN →',C.cyan],['← SYN-ACK',C.green],['ACK →',C.cyan]];
    return e('div',{key:'ladder',style:{position:'absolute',left:'26px',top:'132px',width:'212px',background:'rgba(6,12,22,.72)',border:'1px solid rgba(120,160,210,.2)',borderRadius:'10px',padding:'12px 14px',zIndex:9,pointerEvents:'none',backdropFilter:'blur(4px)'}},
      e('div',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:'10px',letterSpacing:'.2em',color:'#8294af',marginBottom:'10px'}},'3-WAY HANDSHAKE'),
      ...steps.map((s,k)=>{const done=idx>k||idx===3;const active=idx===k;return e('div',{key:k,style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px',opacity:done||active?1:.4}},
        e('div',{style:{width:'8px',height:'8px',borderRadius:'50%',background:done||active?s[1]:'#2a3a4c',boxShadow:done||active?'0 0 8px '+s[1]:'none'}}),
        e('div',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:'12px',color:done||active?s[1]:'#5a6c8a'}},s[0]),
        done?e('div',{style:{marginLeft:'auto',color:s[1],fontSize:'11px'}},'✓'):null);}),
      e('div',{style:{marginTop:'4px',paddingTop:'8px',borderTop:'1px solid rgba(120,160,210,.15)',fontFamily:'IBM Plex Mono,monospace',fontSize:'11px',color:idx>=3?C.green:'#5a6c8a'}},idx>=3?'● ESTABLISHED':'○ connecting…'));}

  scJourney(p){const e=React.createElement,C=this.C;
    const vw=this._vw=window.innerWidth, vh=this._vh=window.innerHeight;
    const tt=this.state.time, cy=vh*0.52, W=Math.max(2600,vw+1700);
    const nodes=[
      {x:140,    y:cy+48, l:'YOUR PC',        c:C.cyan},
      {x:0.21*W, y:cy-36, l:'HOME ROUTER',    c:C.cyan},
      {x:0.40*W, y:cy+60, l:'ISP CORE',       c:C.amber},
      {x:0.60*W, y:cy-56, l:'UNDERSEA FIBER', c:C.green},
      {x:0.80*W, y:cy+52, l:'GOOGLE EDGE',    c:C.violet},
      {x:W-150,  y:cy-22, l:'GOOGLE SERVER',  c:C.white} ];
    const clientX=nodes[0].x, serverX=nodes[nodes.length-1].x, serverY=nodes[nodes.length-1].y;
    const routeY=(x)=>{for(let k=0;k<nodes.length-1;k++){const a=nodes[k],b=nodes[k+1];if(x<=b.x||k===nodes.length-2){const t=this.cl((x-a.x)/(b.x-a.x),0,1);return this.lerp(a.y,b.y,t);}}return nodes[0].y;};

    const phases=[
      {id:'EGRESS',a:0.00,b:0.07,st:'SYN_SENT',  label:'LEAVING THE NIC',         desc:'Encapsulated frames serialize onto the physical medium.'},
      {id:'SYN',   a:0.07,b:0.23,st:'SYN_SENT',  label:'SYN  →',                  desc:'Client opens the connection — SYN, seq=0.'},
      {id:'SYNACK',a:0.23,b:0.38,st:'SYN_RCVD',  label:'←  SYN-ACK',              desc:'Server synchronizes and acknowledges — SYN-ACK, seq=0 ack=1.'},
      {id:'ACK',   a:0.38,b:0.49,st:'ESTABLISHED',label:'ACK  →',                 desc:'Client acknowledges — ACK, ack=1. Three-way handshake complete.'},
      {id:'EST',   a:0.49,b:0.56,st:'ESTABLISHED',label:'CONNECTION ESTABLISHED', desc:'The TCP connection is open — now application data may flow.'},
      {id:'DATA',  a:0.56,b:0.77,st:'ESTABLISHED',label:'SEGMENTED DATA  →',      desc:'The HTTP request is split into numbered TCP segments streaming to Google.'},
      {id:'REASM', a:0.77,b:0.87,st:'ESTABLISHED',label:'REASSEMBLY',             desc:'Segments are reordered by sequence number, then delivered to the app.'},
      {id:'REPLY', a:0.87,b:1.00,st:'ESTABLISHED',label:'←  200 OK',              desc:'The server responds; bytes travel home and the page paints.'} ];
    let ph=phases[0]; for(const f of phases){if(p>=f.a)ph=f;}
    const lt=this.cl((p-ph.a)/(ph.b-ph.a),0,1), et=this.eio(0,1,lt);

    // camera follows the active packet (continuous across phase boundaries)
    let focusX=clientX;
    if(ph.id==='SYN')focusX=this.lerp(clientX,serverX,et);
    else if(ph.id==='SYNACK')focusX=this.lerp(serverX,clientX,et);
    else if(ph.id==='ACK')focusX=this.lerp(clientX,serverX,et);
    else if(ph.id==='EST')focusX=this.lerp(serverX,clientX,et);
    else if(ph.id==='DATA')focusX=this.lerp(clientX,serverX,et);
    else if(ph.id==='REASM')focusX=serverX;
    else if(ph.id==='REPLY')focusX=this.lerp(serverX,clientX,et);
    const camX=this.cl(focusX-vw*0.5,0,Math.max(0,W-vw)), wtf='translateX('+(-camX)+'px)';

    // animated EM-wave field along the route (recomputed each frame → live motion)
    const sineP=(amp,wl,phase,step)=>{let d='';for(let x=clientX-80;x<=serverX+80;x+=step){const y=routeY(x)+amp*Math.sin((x/wl)*6.28318+phase);d+=(d?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' ';}return d;};
    const waves=e('svg',{key:'waves',width:W,height:vh,style:{position:'absolute',left:0,top:0,pointerEvents:'none'}},
      e('path',{d:sineP(0,1,0,48),fill:'none',stroke:'rgba(120,160,210,.16)',strokeWidth:'2'}),
      e('path',{d:sineP(28,300,tt*2.4,16),fill:'none',stroke:C.cyan,strokeWidth:'2',opacity:.34,style:{filter:'drop-shadow(0 0 5px '+C.cyan+')'}}),
      e('path',{d:sineP(44,440,tt*1.6+1.7,16),fill:'none',stroke:C.green,strokeWidth:'1.6',opacity:.22}),
      e('path',{d:sineP(16,170,-tt*3.2+0.6,14),fill:'none',stroke:C.violet,strokeWidth:'1.3',opacity:.22}));

    const nodeEls=nodes.map((n,k)=>{const reached=focusX>=n.x-40||ph.id==='REPLY'||ph.id==='REASM';return e('div',{key:'nd'+k,onClick:()=>this.open(this.inspNode(n.l)),style:{position:'absolute',left:n.x+'px',top:n.y+'px',transform:'translate(-50%,-50%)',textAlign:'center',cursor:'pointer'}},
      e('div',{style:{position:'relative',width:'22px',height:'22px',borderRadius:'50%',margin:'0 auto',background:reached?n.c:'#16222f',border:'2px solid '+n.c+(reached?'':'66'),boxShadow:reached?'0 0 24px '+n.c:'none'}},
        e('div',{style:{position:'absolute',left:'50%',top:'50%',width:'40px',height:'40px',marginLeft:'-20px',marginTop:'-20px',borderRadius:'50%',border:'1px solid '+n.c+'55',animation:'pulse 2.6s ease-out infinite',animationDelay:(k*0.3)+'s'}})),
      e('div',{style:{marginTop:'12px',fontFamily:'IBM Plex Mono,monospace',fontSize:'11px',letterSpacing:'.14em',color:reached?n.c:'#5a6c8a',whiteSpace:'nowrap',textShadow:'0 1px 5px #000'}},n.l));});

    const NSEG=6, layer=[];
    if(ph.id==='EGRESS'){for(let k=0;k<4;k++){const fp=this.cl(et*1.7-k*0.18,0,1);if(fp<=0||fp>=1)continue;const x=this.lerp(clientX,clientX+300,fp);layer.push(this.jpkt('eg'+k,x,routeY(x),'FRAME',C.cyan,0.85,()=>this.open(this.inspJourneyPacket('FRAME',k))));}}
    if(ph.id==='SYN'){const x=this.lerp(clientX,serverX,et);layer.push(this.jpkt('syn',x,routeY(x)+18*Math.sin(tt*6),'SYN  seq=0',C.cyan,1.05,()=>this.open(this.inspJourneyPacket('SYN'))));}
    if(ph.id==='SYNACK'){const x=this.lerp(serverX,clientX,et);layer.push(this.jpkt('sa',x,routeY(x)+18*Math.sin(tt*6),'SYN-ACK  ack=1',C.green,1.05,()=>this.open(this.inspJourneyPacket('SYNACK'))));}
    if(ph.id==='ACK'){const x=this.lerp(clientX,serverX,et);layer.push(this.jpkt('ack',x,routeY(x)+18*Math.sin(tt*6),'ACK  ack=1',C.cyan,1.05,()=>this.open(this.inspJourneyPacket('ACK'))));}
    if(ph.id==='DATA'){for(let k=0;k<NSEG;k++){const sp=this.cl((et-k*0.09)/0.74,0,1);if(sp<=0||sp>=1)continue;const x=this.lerp(clientX,serverX,sp);layer.push(this.jpkt('seg'+k,x,routeY(x)+14*Math.sin(tt*5+k),'SEG '+(k+1)+'/'+NSEG+'  seq='+(k*1460),C.cyan,0.95,()=>this.open(this.inspJourneyPacket('SEG',k))));}}
    if(ph.id==='REPLY'){for(let k=0;k<4;k++){const sp=this.cl((et-k*0.11)/0.72,0,1);if(sp<=0||sp>=1)continue;const x=this.lerp(serverX,clientX,sp);layer.push(this.jpkt('rep'+k,x,routeY(x)+14*Math.sin(tt*5+k),'200 OK  '+(k+1),C.green,0.95,()=>this.open(this.inspJourneyPacket('REPLY',k))));}}

    // reassembly buffer fill state
    let recv=0, delivered=false;
    if(ph.id==='DATA'){recv=this.cl(Math.floor((et-0.74)/0.09)+1,0,NSEG);if(et<0.74)recv=0;}
    if(ph.id==='REASM'){recv=this.cl(Math.floor(et*(NSEG+2)),0,NSEG);delivered=et>0.82;}
    const showBuf=(ph.id==='DATA'&&recv>0)||ph.id==='REASM';

    const world=e('div',{key:'world',style:{position:'absolute',left:0,top:0,width:W+'px',height:vh+'px',transform:wtf,willChange:'transform'}},
      waves, ...nodeEls, ...layer,
      (ph.id==='DATA')?e('div',{key:'srcsplit',style:{position:'absolute',left:clientX+'px',top:(routeY(clientX)-86)+'px',transform:'translate(-50%,0)',textAlign:'center',pointerEvents:'none'}},
        e('div',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:'10px',letterSpacing:'.1em',color:C.cyan,whiteSpace:'nowrap'}},'HTTP REQUEST  →  '+NSEG+' SEGMENTS')):null,
      showBuf?this.reasmBuffer(recv,delivered,serverX,serverY,NSEG):null);

    const status=e('div',{key:'status',style:{position:'absolute',left:'50%',bottom:'120px',transform:'translateX(-50%)',width:Math.min(640,vw-60)+'px',textAlign:'center',pointerEvents:'none',zIndex:9}},
      e('div',{style:{fontFamily:'IBM Plex Mono,monospace',fontSize:'12px',letterSpacing:'.24em',color:C.cyan,marginBottom:'6px'}},'TCP STATE · '+ph.st),
      e('div',{style:{fontSize:'27px',fontWeight:700,letterSpacing:'.02em',color:ph.id==='EST'?C.green:'#eef3ff',textShadow:'0 2px 20px '+(ph.id==='EST'?C.green:C.cyan)+'66'}},ph.label),
      e('div',{style:{fontSize:'13px',color:'#aab8cf',marginTop:'7px',lineHeight:1.5}},ph.desc));

    return e('div',{key:'journeyroot',style:{position:'absolute',inset:0,overflow:'hidden',opacity:this.ss(0,0.07,p),
      background:'radial-gradient(120% 100% at 50% 28%,#08172b 0%,#040b18 55%,#02050c 100%)'}},
      this.stars(), world, this.handshakeLadder(ph.id), status);}

  // ---------- STAGE ----------
  // The motherboard is a SINGLE persistent element (stable keys) so it never
  // remounts between scenes — only the camera transform and the holographic
  // overlays change. This is what keeps transitions smooth and flicker-free.
  renderStage(i,p){const e=React.createElement;
    const vw=this._vw=window.innerWidth, vh=this._vh=window.innerHeight;
    const cam=this.cam(i,p);const tx=vw/2-cam.x*cam.s, ty=vh/2-cam.y*cam.s;
    const proj=(bx,by)=>({x:tx+bx*cam.s,y:ty+by*cam.s});
    const focus=({2:'ram',3:'cpu',4:'cpu',5:'cpu',6:'ram',7:'ram',8:'chipset',9:'nic',10:'nic',11:'nic',12:'eth'})[i]||null;
    const sc=(i>=1)?this.scene(i,p,proj,cam):{board:[],panels:[],beams:[]};
    const tf='translate('+tx+'px,'+ty+'px) scale('+cam.s+')';
    const ent=this.ss(0,0.13,p); // fade overlays in (never the board)
    // during the journey the camera leaves the machine — fade the board out entirely
    const boardOut=(i===12)?(1-this.ss(0.02,0.12,p)):1;
    const showBoard=(i>=1)&&boardOut>0.001;
    // persistent board — stable key, opacity 1, only transform updates
    const boardLayer=showBoard?e('div',{key:'boardlayer',style:{position:'absolute',left:0,top:0,transform:tf,transformOrigin:'0 0',zIndex:5,opacity:boardOut,willChange:'transform'}},
      this.board(focus, this.state.time)):null;
    // scene-specific board-space extras — share the transform, fade per scene
    const extras=(i>=1&&i!==12)?e('div',{key:'extras',style:{position:'absolute',left:0,top:0,transform:tf,transformOrigin:'0 0',zIndex:6,opacity:ent}}, ...sc.board):null;
    // NOTE: pointerEvents:none so this full-screen overlay does not swallow clicks meant for the board beneath it. Its children (panels/beams) are non-interactive anyway.
    const ui=(i>=1&&i!==12)?e('div',{key:'ui',style:{position:'absolute',inset:0,zIndex:7,opacity:ent,pointerEvents:'none'}}, this.beamsSvg(sc.beams), ...sc.panels):null;
    const desk=(i===0)?e('div',{key:'desk',style:{position:'absolute',inset:0,zIndex:8}},this.scDesk(p)):null;
    const journey=(i===12)?e('div',{key:'jr',style:{position:'absolute',inset:0,zIndex:7}},this.scJourney(p)):null;
    return e('div',{key:'stage',style:{position:'absolute',inset:0}}, boardLayer, extras, ui, desk, journey);}

  renderVals(){const {i,p}=this.locate(this.state.time);const C=this.C,e=React.createElement,ch=this.chapters;
    const stage=e('div',{style:{position:'absolute',inset:0}},this.renderStage(i,p), i>0?this.dust():null);
    const ticksNode=e('div',{style:{position:'absolute',left:0,right:0,top:'7px',height:'8px',pointerEvents:'none'}},
      ch.map((c,k)=>e('div',{key:k,style:{position:'absolute',left:(c.start/this.duration*100)+'%',top:0,width:'1.5px',height:'8px',background:c.col,opacity:k===i?1:.4,boxShadow:k===i?'0 0 8px '+c.col:'none'}})));
    const speeds=[0.25,0.5,1,2].map(s=>({label:s+'×',bc:this.state.speed===s?C.cyan+'88':'rgba(160,190,230,.18)',fc:this.state.speed===s?'#9af0f7':'#7d8aa3',bg:this.state.speed===s?C.cyan+'18':'rgba(18,26,40,.7)',set:()=>this.setState({speed:s})}));
    const sel=this.state.sel;
    const inspectorBody = sel? e('div',{style:{display:'flex',flexDirection:'column',gap:'11px'}},
      sel.sections.map((sec,k)=>e('div',{key:k,style:{border:'1px solid '+sec.color+'44',borderRadius:'10px',overflow:'hidden'}},
        e('div',{style:{background:sec.color+'14',padding:'7px 12px',fontFamily:'IBM Plex Mono,monospace',fontSize:'11px',letterSpacing:'.16em',color:sec.color}},sec.label),
        e('div',{style:{padding:'9px 12px',fontFamily:'IBM Plex Mono,monospace',fontSize:'11.5px',lineHeight:'1.75',color:'#cfe0f4'}},
          sec.rows.map((r,j)=>e('div',{key:j},r)))))):null;
    const mm=(t)=>'0:'+String(Math.floor(t)).padStart(2,'0');
    return {stage,ticksNode,speeds,inspectorBody,
      chapterTitle:ch[i].t,chapterLayer:ch[i].layer,chapterDesc:ch[i].d,layerColor:ch[i].col,
      chapterNo:String(i+1).padStart(2,'0'),chapterCount:String(ch.length).padStart(2,'0'),
      duration:this.duration,time:this.state.time,pct:(this.state.time/this.duration*100)+'%',clock:mm(this.state.time)+' / '+mm(this.duration),
      playing:this.state.playing,playLabel:this.state.playing?'❚❚':'▶',url:this.state.url,sel,
      onPlay:()=>{if(this.state.time>=this.duration)this.setState({time:0,playing:true});else this.setState({playing:!this.state.playing});},
      onRestart:()=>this.setState({time:0,playing:true,sel:null}),
      onPrev:()=>{const c=ch[i];const tgt=(this.state.time-c.start<0.4&&i>0)?ch[i-1].start:c.start;this.setState({time:tgt,sel:null});},
      onNext:()=>{const ni=Math.min(i+1,ch.length-1);this.setState({time:ch[ni].start,sel:null});},
      onScrub:(ev)=>this.setState({time:Number(ev.target.value),playing:false}),
      onUrl:(ev)=>this.setState({url:ev.target.value}),onClose:()=>this.setState({sel:null})};}
}
</script>
